<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core System</title>
</head>
<style>
    body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url("../image/banking.png");
        background-repeat: no-repeat;
        background-size: cover;
        opacity: 0.7;
        z-index: -1;
    }
    .parentContainer {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 75vh;
        margin: auto;
    }
    form {
        width: 35%;
        border: 1px solid whitesmoke;
        background-color: transparent;
        box-shadow: 0 6px 9px rgb(0, 0, 0, 0.5);
        padding: 12px 20px;
    }
    .title {
        font-family: Arial;
        font-size: large;
        text-shadow: 0 3px 6px rgba(0, 0, 0, 0.5);
        color: #072a4e;
    }
    input[type=text], input[type=password] {
        width: 100%;
        padding: 12px 18px;
        margin: 12px auto;
        display: inline-block;
        box-sizing: border-box;
        border: none;
        box-shadow: 0 3px 6px rgb(0, 0, 0, 0.5);
        font-family: Arial;
    }
    label {
        font-family: Arial;
    }
    button {
        cursor: pointer;
        font-size: medium;
        font-family: Arial;
        background-color: #0a3f87;
        color: white;
        border: none;
        box-shadow: 0 3px 6px rgb(0, 0, 0, 0.5);
        width: 100%;
        margin: 12px auto;
        padding: 9px;
    }
    button:hover {
        opacity: 0.8;
        box-shadow: 0 3px 6px rgb(0, 0, 0, 0.5);
    }
    .cancelforgetPass {
        font-family: Arial;
        font-size: medium;
        padding-top: 12px;
    }
    .cancelButton {
        width: auto;
        padding: 8px 16px;
        font-size: medium;
        font-family: Arial;
    }
    span.forgetPass {
        float: right;
        padding-top: 16px;
    }
</style>
<body>
<div class="parentContainer">
<form action="" method="post" >
    <div class="title">
        <center><h2>Login</h2></center>
    </div>
    <div class="labelinputLogin">
        <label for="userName"><b>Username</b></label>
        <input type="text" placeholder="Enter Username" id="userName" required>
        <label for="userPass"><b>Password</b></label>
        <input type="password" placeholder="Enter Password" id="userPass" required>
        <button type="button" onclick="redirectmortgageSystem()">Login</button>
        <label><input type="checkbox" checked="checked" name="remember"> Remember me </label>
    </div>
    <div class="cancelforgetPass">
        <button type="button" class="cancelButton" onclick="getbackDefault()">Cancel</button>
        <span class="forgetPass"><a href="#">Forgot password</a></span>
    </div>
</div>
</form>
<script>
    function redirectmortgageSystem () {
        const userName = "phok.sosatsyabrawit";
        const userPass = "Braw$tlocal95";
        const validUname = document.getElementById("userName").value;
        const validUpass = document.getElementById("userPass").value;
        if (validUname === userName && validUpass === userPass) {
            window.open("http://127.0.0.1:5050/mortgageSystem.html");
        } else {
            alert("Username and Password Incorrect ...");
        }
    }
    function getbackDefault () {
        window.location.href = ("http://127.0.0.1:5050/psbwebPortal.html");
    }
</script>
</body>
</html>
