<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortgage System</title>
</head>
<style>
  body {
    margin: 0;
    height: 60vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url("../image/banking.png");
    background-repeat: no-repeat;
    background-size: cover;
    opacity: 0.7;
    z-index: -1;
  }
  .title {
    font-family: Arial;
    font-size: large;
    text-shadow: 0 3px 6px rgba(0, 0, 0, 0.5);
    color: #072a4e;
  }
  .formRow {
    display: grid;
    grid-template-columns: 150px 1fr;
    gap: 10px 15px;
    align-items: center;
  }
  .formGroup {
    display: contents;
  }
  .formGroup  label {
    text-align: left;
    font-family: Arial;
    font-size: medium;
  }
  .formGroup input {
    width: 45vh;
    padding: 10px;
    border: none;
    box-shadow: 0 3px 6px rgba(0, 0, 0, 0.5);
  }
  .formButton {
    display: grid;
    grid-template-columns: repeat(2, auto);
    gap: 6px;
  }
  .sumButton {
    width: 100%;
    margin-top: 8px;
    padding: 10px;
    border: none;
    background-color: #0a3f87;
    box-shadow: 0 3px 6px rgb(0, 0, 0, 0.5);
    color: white;
    font-family: Arial;
    font-size: small;
    cursor: pointer;
  }
  .sumButton:hover {
    font-family: Arial;
    font-size: small;
    opacity: 0.8;
    color: black;
    background-color: white;
  }
  .cancelButton {
    width: 100%;
    margin-top: 8px;
    padding: 10px;
    border: none;
    background-color: #0a3f87;
    box-shadow: 0 3px 6px rgb(0, 0, 0, 0.5);
    color: white;
    font-family: Arial;
    font-size: small;
    cursor: pointer;
  }
  .cancelButton:hover {
    font-family: Arial;
    font-size: small;
    opacity: 0.8;
    color: black;
    background-color: white;
  }
</style>
<body>
  <div class="parentContainer">
    <div class="title">
      <center><h2>Mortgage System</h2></center>
    </div>
      <div class="formRow">
        <div class="formGroup">
          <label for="amount">Principal:</label>
          <input type="text" placeholder="$ please enter your amount" id="amount"required>
        </div>
        <div class="formGroup">
          <label for="monthlyInterest">Monthly Interest:</label>
          <input type="text" placeholder="%" id="monthlyInterest">
        </div>
        <div class="formGroup">
          <label for="period">Period:</label>
          <input type="text" id="period">
        </div>
        <div class="formGroup">
          <label for="deposit">Deposit:</label>
          <input type="text" placeholder="%" id="deposit">
        </div>
        <div class="formGroup">
          <label for="monthlyPayment">Monthly Payment:</label>
          <input type="text" placeholder="$" id="monthlyPayment">
        </div>
      </div>
    <div class="formButton">
      <button class="sumButton" onclick="monthlyPayment()">Calculation</button>
      <button type="button" class="cancelButton" onclick="getbackDefault()">Cancel</button>
    </div>
  </div>
  <script>
    function monthlyPayment() {
      let inputAmount = Number(document.getElementById("amount").value);
      let inputmonthlyInterest = Number(document.getElementById("monthlyInterest").value);
      let inputPeriod = Number(document.getElementById("period").value);
      let inputDeposit = Number(document.getElementById("deposit").value);

      let period = inputPeriod * 12;
      let deposit = inputDeposit * inputAmount / 100;
      let amountafterDeposit = inputAmount - deposit;
      let sumamountplusInterest = amountafterDeposit * parseFloat(inputmonthlyInterest) * period /100;
      let summonthlyPayment = sumamountplusInterest / period;

      const summonthlypaymentF = new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency: 'USD'
      }).format(summonthlyPayment);

      document.getElementById("monthlyPayment").value = summonthlypaymentF;
    }
    function getbackDefault () {
      window.location.href = ("http://127.0.0.1:5050/webPortal.html");
    }
  </script>
</body>
</html>
