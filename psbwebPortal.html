<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSB WEB PORTAL</title>
</head>
<body>
<style>
    body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url("../image/banking.png");
        background-repeat: no-repeat;
        background-size: cover;
        opacity: 0.7;
        z-index: -1;
    }
    .parentContainer{
        display: grid;
        margin: auto;
        justify-content: center;
        align-items: center;
        padding: 110px;
    }
    .title {
        font-family: Arial;
        font-size: large;
        text-shadow: 0 3px 6px rgba(0, 0, 0, 0.5);
        color: #072a4e;
    }
    .systemButton {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
        max-width: 1200px;
    }
    .coresystemButton {
        cursor: pointer;
        padding: 12px 24px;
        min-width: 450px;
        font-size: large;
        font-family: Arial;
        background-color: #0a3f87;
        color: white;
        border: none;
        box-shadow: 0 3px 6px rgb(0, 0, 0, 0.5);
    }
    .coresystemButton:hover {
        opacity: 0.8;
        background-color: white;
        color: black;
        box-shadow: 0 3px 6px rgb(0, 0, 0, 0.5);
    }
    .mortgagesystemButton {
        cursor: pointer;
        padding: 12px 24px;
        min-width: 450px;
        font-size: large;
        font-family: Arial;
        background-color: #0a3f87;
        color: white;
        border: none;
        box-shadow: 0 3px 6px rgb(0, 0, 0, 0.5);
    }
    .mortgagesystemButton:hover {
        opacity: 0.8;
        background-color: white;
        color: black;
        box-shadow: 0 3px 6px rgb(0, 0, 0, 0.5);
    }
    .employeesystemButton {
        cursor: pointer;
        padding: 12px 24px;
        min-width: 450px;
        font-size: large;
        font-family: Arial;
        background-color: #0a3f87;
        color: white;
        border: none;
        box-shadow: 0 3px 6px rgb(0, 0, 0, 0.5);
    }
    .employeesystemButton:hover {
        opacity: 0.8;
        background-color: white;
        color: black;
        box-shadow: 0 3px 6px rgb(0, 0, 0, 0.5);
    }
    .addnewButton{
        cursor: pointer;
        padding: 12px 24px;
        min-width: 450px;
        font-size: large;
        font-family: Arial;
        color: #000000;
        border: dashed;
        box-shadow: 0 3px 6px rgb(0, 0, 0, 0.5);
        background-color: transparent;
    }
    .addnewButton:hover {
        color: #0a3f87;
        font-weight: bolder;
    }
</style>
<body>
    <div class="parentContainer">
        <div class="title">
            <center><h1>PSB Web Portal</h1></center>
        </div>
            <div class="systemButton">
                <button class="coresystemButton" onclick="redirectcoreSystem()">Core System</button>
                <button class="mortgagesystemButton" onclick="redirectmortgageSystem()">Mortgage System</button>
                <button class="employeesystemButton" onclick="redirectemployeeSystem()">Employee System</button>
                <button class="addnewButton">Add new Link</button>
            </div>
    </div>
<script>
        function redirectcoreSystem () {
            window.open("coreSystem.html", "_blank"); /* one click open in new tab */
        }
        function redirectmortgageSystem () {
            window.open("mortgageSystem.html", "_blank"); /* one click open in new tab */
        }
        function redirectemployeeSystem () {
            window.open("employeeSystem.html", "_blank"); /* one click open in new tab */
        }
</script>
</body>
</html>
